url: https://n8layman.github.io/ecoreview/

template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    after_body: >
      <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
      <script>
        mermaid.initialize({ startOnLoad: false, theme: "default" });
        document.querySelectorAll("pre.mermaid").forEach(function(pre) {
          var code = pre.querySelector("code");
          var text = code ? code.textContent : pre.textContent;
          var div = document.createElement("div");
          div.className = "mermaid";
          div.textContent = text;
          pre.parentElement.replaceChild(div, pre);
        });
        mermaid.run();
      </script>

navbar:
  bg: primary
  structure:
    left: [home, workflow, reviewing, accuracy, reference]
    right: [search, github]
  components:
    home:
      icon: fa-home
      href: index.html
      aria-label: Home
    workflow:
      text: Guide
      href: articles/ecoreview-workflow.html
    reviewing:
      text: Reviewing
      href: articles/reviewing-extraction-output.html
    accuracy:
      text: Accuracy
      href: articles/accuracy.html
    reference:
      text: Reference
